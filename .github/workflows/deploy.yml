name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "KALTURA_*.md"
      - "README.md"
      - "CONTRIBUTING.md"
      - "PLAN.md"
      - "AGENTS.md"
      - "GUIDE_MAP.md"
      - "LICENSE"
      - "CODE_OF_CONDUCT.md"
      - "mkdocs.yml"
      - ".agents/skills/kaltura-api/SKILL.md"
      - "assets/**"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ── Publish Docs Site ────────────────────────────────────
  pages:
    name: GitHub Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install MkDocs Material
        run: pip install mkdocs-material

      - name: Prepare docs directory
        run: |
          mkdir -p docs
          for f in *.md; do
            ln -sf "../$f" "docs/$f"
          done
          ln -sf ../LICENSE docs/LICENSE
          ln -sf ../assets docs/assets

      - name: Build and deploy
        run: mkdocs gh-deploy --force
