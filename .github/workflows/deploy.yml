name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "KALTURA_*.md"
      - "README.md"
      - "CONTRIBUTING.md"
      - "PLAN.md"
      - "AGENTS.md"
      - "GUIDE_MAP.md"
      - "LICENSE"
      - "CODE_OF_CONDUCT.md"
      - "mkdocs.yml"
      - ".agents/skills/kaltura-api/SKILL.md"
      - "assets/**"
      - "functions/**"
      - "overrides/**"
      - "llms.txt"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ── Publish Docs Site ────────────────────────────────────
  pages:
    name: GitHub Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install MkDocs Material
        run: pip install mkdocs-material

      - name: Prepare docs directory
        run: |
          mkdir -p docs
          for f in *.md; do
            ln -sf "../$f" "docs/$f"
          done
          ln -sf ../LICENSE docs/LICENSE
          ln -sf ../assets docs/assets

      - name: Build and deploy
        run: mkdocs gh-deploy --force

  # ── Deploy to Cloudflare Workers (kaltura.md) ────────────
  cloudflare:
    name: Cloudflare Worker
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Check for Cloudflare credentials
        id: check-secrets
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping Cloudflare deploy — CLOUDFLARE_API_TOKEN secret not configured"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.check-secrets.outputs.skip != 'true'

      - uses: actions/setup-python@v5
        if: steps.check-secrets.outputs.skip != 'true'
        with:
          python-version: "3.x"

      - name: Install MkDocs Material
        if: steps.check-secrets.outputs.skip != 'true'
        run: pip install mkdocs-material

      - name: Prepare docs directory
        if: steps.check-secrets.outputs.skip != 'true'
        run: |
          mkdir -p docs
          for f in *.md; do
            ln -sf "../$f" "docs/$f"
          done
          ln -sf ../LICENSE docs/LICENSE
          ln -sf ../assets docs/assets

      - name: Build site
        if: steps.check-secrets.outputs.skip != 'true'
        run: mkdocs build

      - name: Prepare raw markdown for agents
        if: steps.check-secrets.outputs.skip != 'true'
        run: |
          mkdir -p site/raw
          cp KALTURA_*.md README.md GUIDE_MAP.md CONTRIBUTING.md PLAN.md AGENTS.md site/raw/
          cp llms.txt site/

      - name: Deploy to Cloudflare
        if: steps.check-secrets.outputs.skip != 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          wranglerVersion: "3"
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
