name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 9 * * 1" # Weekly link check — Mondays 9am UTC

jobs:
  # ── Quality Gates ────────────────────────────────────────
  commit-lint:
    name: Commit lint
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: opensource-nepal/commitlint@v1

  link-check:
    name: Link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --accept 200,202,204,301,302,403,429
            --exclude-path tests
            --exclude-path .github
            --exclude-path .claude
            --exclude-path .agents
            --exclude 'cdnapisec\.kaltura\.com'
            --exclude 'events-api\.nvp1'
            --exclude 'agents-manager\.nvp1'
            --exclude 'genie\.nvp1'
            --exclude 'kaltura\.github\.io'
            --exclude 'localhost'
            '**/*.md'
          fail: true
