name: Test

on:
  push:
    branches: [main]
    paths:
      - "KALTURA_*.md"
      - "tests/test_*.py"
      - "tests/test_helpers.py"
      - ".github/workflows/test.yml"
  pull_request:
    paths:
      - "KALTURA_*.md"
      - "tests/test_*.py"
      - "tests/test_helpers.py"
      - ".github/workflows/test.yml"
  workflow_dispatch:
    inputs:
      run_all:
        description: "Run all tests (ignore change detection)"
        type: boolean
        default: false

jobs:
  # ── Determine which tests to run ─────────────────────────
  detect-changes:
    name: Detect changed guides
    runs-on: ubuntu-latest
    outputs:
      api_tests: ${{ steps.filter.outputs.api_tests }}
      browser_tests: ${{ steps.filter.outputs.browser_tests }}
      run_all: ${{ steps.filter.outputs.run_all }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Determine test scope
        id: filter
        run: |
          RUN_ALL="false"

          # Run all if: workflow_dispatch with run_all, test_helpers changed, or workflow file changed
          if [ "${{ inputs.run_all }}" = "true" ]; then
            RUN_ALL="true"
          fi

          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")

          if echo "$CHANGED" | grep -q "tests/test_helpers.py"; then
            RUN_ALL="true"
          fi
          if echo "$CHANGED" | grep -q ".github/workflows/test.yml"; then
            RUN_ALL="true"
          fi

          if [ "$RUN_ALL" = "true" ]; then
            echo "run_all=true" >> "$GITHUB_OUTPUT"
            echo "api_tests=" >> "$GITHUB_OUTPUT"
            echo "browser_tests=" >> "$GITHUB_OUTPUT"
            echo "::notice::Running ALL tests (helpers/workflow changed or manual trigger)"
            exit 0
          fi

          echo "run_all=false" >> "$GITHUB_OUTPUT"

          # Map changed guides/tests to their test files
          API_TESTS=""
          BROWSER_TESTS=""

          # Browser E2E test files (Playwright-dependent)
          BROWSER_FILES="test_experience_components_e2e.py test_unisphere_framework_e2e.py test_agents_widget_api.py test_content_lab_api.py test_genie_widget_api.py test_media_manager_api.py test_vod_avatar_api.py"

          for file in $CHANGED; do
            TEST_FILE=""

            # Direct test file change
            if echo "$file" | grep -qE "^tests/test_.*\.py$"; then
              TEST_FILE=$(basename "$file")
            fi

            # Guide change → derive test file
            if echo "$file" | grep -qE "^KALTURA_.*\.md$"; then
              # KALTURA_FOO_API.md → test_foo_api.py (lowercase, strip KALTURA_ prefix and .md suffix)
              GUIDE_NAME=$(echo "$file" | sed 's/^KALTURA_//; s/\.md$//; s/\(.*\)/\L\1/')
              TEST_FILE="test_${GUIDE_NAME}.py"

              # Handle special mappings
              case "$file" in
                KALTURA_EXPERIENCE_COMPONENTS_API.md)
                  TEST_FILE="test_experience_components_api.py"
                  BROWSER_TESTS="${BROWSER_TESTS} tests/test_experience_components_e2e.py"
                  ;;
                KALTURA_UNISPHERE_FRAMEWORK_API.md)
                  TEST_FILE="test_unisphere_framework_api.py"
                  BROWSER_TESTS="${BROWSER_TESTS} tests/test_unisphere_framework_e2e.py"
                  ;;
                KALTURA_CAPTIONS_EDITOR_API.md)
                  BROWSER_TESTS="${BROWSER_TESTS} tests/test_experience_components_e2e.py"
                  TEST_FILE=""
                  ;;
                KALTURA_EXPRESS_RECORDER_API.md)
                  BROWSER_TESTS="${BROWSER_TESTS} tests/test_experience_components_e2e.py"
                  TEST_FILE=""
                  ;;
              esac
            fi

            if [ -n "$TEST_FILE" ] && [ -f "tests/$TEST_FILE" ]; then
              # Classify as browser or API test
              if echo "$BROWSER_FILES" | grep -q "$TEST_FILE"; then
                BROWSER_TESTS="${BROWSER_TESTS} tests/${TEST_FILE}"
              else
                API_TESTS="${API_TESTS} tests/${TEST_FILE}"
              fi
            fi
          done

          # Deduplicate
          API_TESTS=$(echo "$API_TESTS" | tr ' ' '\n' | sort -u | tr '\n' ' ' | xargs)
          BROWSER_TESTS=$(echo "$BROWSER_TESTS" | tr ' ' '\n' | sort -u | tr '\n' ' ' | xargs)

          echo "api_tests=$API_TESTS" >> "$GITHUB_OUTPUT"
          echo "browser_tests=$BROWSER_TESTS" >> "$GITHUB_OUTPUT"

          if [ -n "$API_TESTS" ]; then
            echo "::notice::API tests to run: $API_TESTS"
          fi
          if [ -n "$BROWSER_TESTS" ]; then
            echo "::notice::Browser tests to run: $BROWSER_TESTS"
          fi
          if [ -z "$API_TESTS" ] && [ -z "$BROWSER_TESTS" ]; then
            echo "::notice::No matching test files for changed guides"
          fi

  # ── Live API Validation ──────────────────────────────────
  api-tests:
    name: API validation
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.run_all == 'true' || needs.detect-changes.outputs.api_tests != ''
    env:
      KALTURA_PARTNER_ID: ${{ secrets.KALTURA_PARTNER_ID }}
      KALTURA_KS: ${{ secrets.KALTURA_KS }}
      KALTURA_SERVICE_URL: ${{ secrets.KALTURA_SERVICE_URL }}
      KALTURA_ADMIN_SECRET: ${{ secrets.KALTURA_ADMIN_SECRET }}
      KALTURA_GENIE_URL: ${{ secrets.KALTURA_GENIE_URL }}
      KALTURA_PLAYER_ID: ${{ secrets.KALTURA_PLAYER_ID }}
      KALTURA_GENIE_CATEGORY_ID: ${{ secrets.KALTURA_GENIE_CATEGORY_ID }}
      KALTURA_USER_ID: ${{ secrets.KALTURA_USER_ID }}
    steps:
      - name: Check for API credentials
        id: check-secrets
        run: |
          if [ -z "$KALTURA_PARTNER_ID" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping API tests — KALTURA_PARTNER_ID secret not configured"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.check-secrets.outputs.skip != 'true'

      - uses: actions/setup-python@v5
        if: steps.check-secrets.outputs.skip != 'true'
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.check-secrets.outputs.skip != 'true'
        run: pip install requests

      - name: Run API tests
        if: steps.check-secrets.outputs.skip != 'true'
        run: |
          failed=0
          RUN_ALL="${{ needs.detect-changes.outputs.run_all }}"
          SELECTED_TESTS="${{ needs.detect-changes.outputs.api_tests }}"

          if [ "$RUN_ALL" = "true" ]; then
            # Full test suite
            TEST_FILES=$(find tests -name "test_*.py" -not -name "test_experience_components_e2e.py" -not -name "test_unisphere_framework_e2e.py" -not -name "test_agents_widget_api.py" -not -name "test_content_lab_api.py" -not -name "test_genie_widget_api.py" -not -name "test_media_manager_api.py" -not -name "test_vod_avatar_api.py" | sort)
          else
            TEST_FILES="$SELECTED_TESTS"
          fi

          for test_file in $TEST_FILES; do
            echo ""
            echo "════════════════════════════════════════════"
            echo "Running: $test_file"
            echo "════════════════════════════════════════════"
            if ! python3 "$test_file"; then
              echo "::error::FAILED: $test_file"
              failed=$((failed + 1))
            fi
          done
          echo ""
          echo "════════════════════════════════════════════"
          if [ "$failed" -gt 0 ]; then
            echo "::error::$failed test file(s) failed"
            exit 1
          else
            echo "All API test files passed"
          fi

  # ── Browser E2E (Playwright-dependent tests) ────────────
  browser-e2e:
    name: Browser E2E (Playwright)
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.run_all == 'true' || needs.detect-changes.outputs.browser_tests != ''
    env:
      KALTURA_PARTNER_ID: ${{ secrets.KALTURA_PARTNER_ID }}
      KALTURA_KS: ${{ secrets.KALTURA_KS }}
      KALTURA_SERVICE_URL: ${{ secrets.KALTURA_SERVICE_URL }}
      KALTURA_ADMIN_SECRET: ${{ secrets.KALTURA_ADMIN_SECRET }}
      KALTURA_GENIE_URL: ${{ secrets.KALTURA_GENIE_URL }}
      KALTURA_PLAYER_ID: ${{ secrets.KALTURA_PLAYER_ID }}
      KALTURA_USER_ID: ${{ secrets.KALTURA_USER_ID }}
    steps:
      - name: Check for API credentials
        id: check-secrets
        run: |
          if [ -z "$KALTURA_PARTNER_ID" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping browser E2E tests — KALTURA_PARTNER_ID secret not configured"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.check-secrets.outputs.skip != 'true'

      - uses: actions/setup-python@v5
        if: steps.check-secrets.outputs.skip != 'true'
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.check-secrets.outputs.skip != 'true'
        run: |
          pip install requests playwright
          playwright install --with-deps chromium

      - name: Run browser E2E tests
        if: steps.check-secrets.outputs.skip != 'true'
        run: |
          failed=0
          RUN_ALL="${{ needs.detect-changes.outputs.run_all }}"
          SELECTED_TESTS="${{ needs.detect-changes.outputs.browser_tests }}"

          if [ "$RUN_ALL" = "true" ]; then
            TEST_FILES="tests/test_experience_components_e2e.py tests/test_unisphere_framework_e2e.py tests/test_agents_widget_api.py tests/test_content_lab_api.py tests/test_genie_widget_api.py tests/test_media_manager_api.py tests/test_vod_avatar_api.py"
          else
            TEST_FILES="$SELECTED_TESTS"
          fi

          for test_file in $TEST_FILES; do
            echo ""
            echo "════════════════════════════════════════════"
            echo "Running: $test_file"
            echo "════════════════════════════════════════════"
            if ! python3 "$test_file"; then
              echo "::error::FAILED: $test_file"
              failed=$((failed + 1))
            fi
          done
          echo ""
          echo "════════════════════════════════════════════"
          if [ "$failed" -gt 0 ]; then
            echo "::error::$failed test file(s) failed"
            exit 1
          else
            echo "All browser E2E test files passed"
          fi
