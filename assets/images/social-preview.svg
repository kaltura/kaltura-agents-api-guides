    <text x="170" y="50" font-family="'Source Sans Pro', 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="600" fill="#5BC686" text-anchor="start" letter-spacing="1">CREATE</text>
    <text x="-170" y="50" font-family="'Source Sans Pro', 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="600" fill="#41BEFF" text-anchor="end" letter-spacing="1">MANAGE</text>

    <!-- Sparkles on the flywheel (like USPs slide) -->
    <use href="#sparkle4" x="112" y="-100" width="14" height="14" color="#5BC686" opacity="0.6"/>
    <use href="#sparkleSm" x="-130" y="-80" width="8" height="8" color="#FF9DFF" opacity="0.5"/>
    <use href="#sparkle4" x="-10" y="135" width="12" height="12" color="#41BEFF" opacity="0.5"/>

    <!-- Center: audience segments -->
    <text x="0" y="-24" font-family="'Source Sans Pro', 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="500" fill="rgba(255,255,255,0.8)" text-anchor="middle">Customers</text>
    <text x="0" y="2" font-family="'Source Sans Pro', 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="500" fill="rgba(255,255,255,0.8)" text-anchor="middle">Employees</text>
    <text x="0" y="28" font-family="'Source Sans Pro', 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="500" fill="rgba(255,255,255,0.8)" text-anchor="middle">Learners</text>
    <text x="0" y="54" font-family="'Source Sans Pro', 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="500" fill="rgba(255,255,255,0.8)" text-anchor="middle">Audiences</text>
  </g>

  <!-- ==================== VALUE BARS (inspired by challenges slide gradient bars) ==================== -->
  <g transform="translate(60, 350)">
    <!-- Row 1 -->
    <rect x="0" y="0" width="260" height="34" rx="6" fill="url(#barYellow)" opacity="0.2"/>
    <rect x="0" y="0" width="260" height="34" rx="6" fill="none" stroke="#FFD357" stroke-width="0.7" stroke-opacity="0.3"/>
    <text x="16" y="22" font-family="'Source Sans Pro', 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600" fill="#FFD357">Rich, Personalized Experiences</text>

    <rect x="274" y="0" width="260" height="34" rx="6" fill="url(#barBlue)" opacity="0.15"/>
    <rect x="274" y="0" width="260" height="34" rx="6" fill="none" stroke="#41BEFF" stroke-width="0.7" stroke-opacity="0.3"/>
    <text x="290" y="22" font-family="'Source Sans Pro', 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600" fill="#b6d7ff">Compliant Agentic Workflows</text>

    <!-- Row 2 -->
