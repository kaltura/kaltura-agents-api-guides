  <!-- ==================== DISCOVERY BADGES ==================== -->
  <g transform="translate(60, 520)">
    <text x="0" y="15" font-family="'Source Sans Pro', 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" fill="rgba(255,255,255,0.25)">AI Agent Access:</text>

    <rect x="115" y="0" width="96" height="26" rx="13" fill="rgba(255,157,255,0.08)" stroke="#FF9DFF" stroke-width="0.7" stroke-opacity="0.35"/>
    <text x="163" y="17" font-family="'Source Code Pro', monospace" font-size="11" fill="#FF9DFF" text-anchor="middle">Agent Skill</text>

    <rect x="222" y="0" width="76" height="26" rx="13" fill="rgba(255,211,87,0.08)" stroke="#FFD357" stroke-width="0.7" stroke-opacity="0.35"/>
    <text x="260" y="17" font-family="'Source Code Pro', monospace" font-size="11" fill="#FFD357" text-anchor="middle">llms.txt</text>

    <rect x="310" y="0" width="82" height="26" rx="13" fill="rgba(91,198,134,0.08)" stroke="#5BC686" stroke-width="0.7" stroke-opacity="0.35"/>
    <text x="351" y="17" font-family="'Source Code Pro', monospace" font-size="11" fill="#5BC686" text-anchor="middle">Context7</text>

    <rect x="404" y="0" width="54" height="26" rx="13" fill="rgba(0,110,250,0.08)" stroke="#006EFA" stroke-width="0.7" stroke-opacity="0.35"/>
    <text x="431" y="17" font-family="'Source Code Pro', monospace" font-size="11" fill="#b6d7ff" text-anchor="middle">curl</text>
