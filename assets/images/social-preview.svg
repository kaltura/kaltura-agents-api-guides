    <rect x="0" y="44" width="260" height="34" rx="6" fill="none" stroke="#5BC686" stroke-width="0.7" stroke-opacity="0.3"/>
    <text x="16" y="66" font-family="'Source Sans Pro', 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600" fill="#5BC686">AI-Powered Creation at Scale</text>

    <rect x="274" y="44" width="260" height="34" rx="6" fill="url(#barRed)" opacity="0.15"/>
    <rect x="274" y="44" width="260" height="34" rx="6" fill="none" stroke="#FF3D23" stroke-width="0.7" stroke-opacity="0.25"/>
    <text x="290" y="66" font-family="'Source Sans Pro', 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600" fill="#ff8a7a">Unified Enterprise Platform</text>

    <!-- Row 3 -->
    <rect x="0" y="88" width="260" height="34" rx="6" fill="url(#barPink)" opacity="0.15"/>
    <rect x="0" y="88" width="260" height="34" rx="6" fill="none" stroke="#FF9DFF" stroke-width="0.7" stroke-opacity="0.3"/>
    <text x="16" y="110" font-family="'Source Sans Pro', 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600" fill="#FF9DFF">Intelligence &amp; Analytics</text>

    <rect x="274" y="88" width="260" height="34" rx="6" fill="url(#barOrange)" opacity="0.15"/>
    <rect x="274" y="88" width="260" height="34" rx="6" fill="none" stroke="#FFAA00" stroke-width="0.7" stroke-opacity="0.3"/>
    <text x="290" y="110" font-family="'Source Sans Pro', 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600" fill="#FFAA00">Conversational AI and Avatars</text>
